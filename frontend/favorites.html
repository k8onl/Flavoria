<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites | Flavoria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- (Copy your exact <header class="topbar">...</header> here from index.html) -->

    <main>
        <section class="page-hero menu-hero">
            <div class="container hero-banner">
                <div class="hero-banner-copy">
                    <span class="eyebrow">Personal collection</span>
                    <h1>Your Favorite Flavors.</h1>
                    <p>All the dishes you love and crave, saved in one convenient place for quick ordering.</p>
                </div>
            </div>
        </section>

        <section class="menu-page">
            <div class="container">
                <div class="section-intro">
                    <span class="section-label"><i class="fas fa-heart"></i> Saved Items</span>
                    <h2>Your handpicked menu.</h2>
                </div>

                <!-- We use a unique ID here for the JS to target -->
                <div class="food-grid" id="favoritesList">
                    <!-- Favorite items will be loaded here by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <!-- (Copy your exact <footer class="page-footer">...</footer> here from index.html) -->

    <script src="script.js"></script>
</body>
</html>
